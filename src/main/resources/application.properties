spring.application.name=send_bill

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/send_bill?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# JWT
jwt.secret=ThisIsASecretKeyForJwtTokenGenerationThatMustBe256BitsLongAtLeastForHS256
jwt.expiration=86400000

server.port=1215
