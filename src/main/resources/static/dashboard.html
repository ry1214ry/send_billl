<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="/js/app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f1f5f9; }
        nav { background: #1e293b; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav h2 { font-size: 1.1rem; }
        nav button { background: #ef4444; color: white; border: none; padding: .5rem 1rem; border-radius: 8px; cursor: pointer; font-size: .8rem; }
        nav button:hover { background: #dc2626; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 2rem; }
        .card h1 { font-size: 1.25rem; margin-bottom: 1.5rem; }
        .info-grid { display: grid; grid-template-columns: 1fr 2fr; gap: .75rem; font-size: .9rem; border-top: 1px solid #e2e8f0; padding-top: 1rem; }
        .info-grid .label { color: #64748b; font-weight: 500; }
        .loading { text-align: center; padding: 3rem; color: #64748b; }
    </style>
</head>
<body>
<nav>
    <h2>Send Bill</h2>
    <button onclick="logout()">Logout</button>
</nav>
<div class="container">
    <div class="card">
        <h1>Welcome, <span id="welcomeName">User</span>!</h1>
        <div id="loading" class="loading">Loading user profile information...</div>
        <div id="userInfo" class="info-grid" style="display:none">
            <span class="label">User ID:</span><span id="uid"></span>
            <span class="label">Full Name:</span><span id="uname"></span>
            <span class="label">Email Address:</span><span id="uemail"></span>
        </div>
    </div>
</div>

<script>
    (async function() {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login.html'; return; }

        const data = await apiCall('/me');
        if (!data || data.error) {
            logout();
            return;
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('userInfo').style.display = 'grid';

        document.getElementById('welcomeName').textContent = data.name;
        document.getElementById('uid').textContent = data.id;
        document.getElementById('uname').textContent = data.name;
        document.getElementById('uemail').textContent = data.email;
    })();
</script>
</body>
</html>
