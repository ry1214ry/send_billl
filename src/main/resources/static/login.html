<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="/js/app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f1f5f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); width: 100%; max-width: 400px; }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .25rem; }
        input { width: 100%; padding: .625rem .75rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: .875rem; }
        .error { color: #dc2626; font-size: .8rem; margin-bottom: 1rem; display: none; background: #fef2f2; padding: 0.5rem; border-radius: 6px; border: 1px solid #fca5a5; }
        button { width: 100%; padding: .7rem; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: .9rem; cursor: pointer; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
<div class="card">
    <h1>Login</h1>
    <div id="error" class="error"></div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="********">
    </div>
    <button onclick="handleLogin()">Sign In</button>
</div>

<script>
    // Double check token to avoid loading login screen if already logged in
    if (localStorage.getItem('token')) {
        window.location.href = '/dashboard.html';
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errEl = document.getElementById('error');
        errEl.style.display = 'none';

        if (!email || !password) {
            errEl.textContent = "Please fill in all fields.";
            errEl.style.display = 'block';
            return;
        }

        // Call our relative auth mapping endpoint
        const data = await apiCall('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
        });

        if (!data || data.error || data.message) {
            errEl.textContent = data?.error || data?.message || "Invalid credentials.";
            errEl.style.display = 'block';
            return;
        }

        // Save session data safely upon response
        if (data.token) {
            localStorage.setItem('token', data.token);
            if (data.user) {
                localStorage.setItem('user', JSON.stringify(data.user));
            }
            window.location.href = '/dashboard.html';
        } else {
            errEl.textContent = "Authentication successful, but no token returned.";
            errEl.style.display = 'block';
        }
    }
</script>
</body>
</html>
