<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Send Bill Login</title>
    <script src="/js/app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #cbeeff;
            padding: 20px;
        }

        /* Split Screen Container Card */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 900px;
            min-height: 480px;
            display: flex;
            overflow: hidden;
        }

        /* Left Side: Form Elements */
        .form-side {
            flex: 1;
            padding: 3.5rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            color: #0082cb;
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 2rem;
        }

        .field {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: #000000;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #000000;
            border-radius: 8px;
            font-size: 1rem;
            color: #333;
            outline: none;
        }

        input::placeholder {
            color: #a0a0a0;
        }

        .error {
            color: #dc2626;
            font-size: .9rem;
            margin-bottom: 1rem;
            display: none;
            background: #fef2f2;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid #fca5a5;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #ffffff;
            color: #000000;
            border: 1.5px solid #000000;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #f5f5f5;
        }

        /* Right Side: Teal Visual Panel */
        .visual-side {
            flex: 1;
            background-color: #00a5ba;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        /* ATM Slot Graphic */
        .atm-slot {
            width: 220px;
            height: 40px;
            background-color: #3d3d3d;
            border-radius: 10px;
            border: 4px solid #5a5a5a;
            position: relative;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
        }


        .receipt {
            position: absolute;
            top: 22px;
            width: 190px;
            background: #e1e1e1;
            border-radius: 0 0 15px 15px;
            padding: 15px 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            font-family: 'Courier New', Courier, monospace;
            font-size: 7px;
            color: #222;
            line-height: 1.3;
        }

        .receipt-title {
            text-align: center;
            font-weight: bold;
            font-size: 9px;
            margin-bottom: 8px;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .receipt-divider {
            border-top: 1px dashed #666;
            margin: 5px 0;
        }

        .barcode {
            width: 80%;
            height: 20px;
            margin: 10px auto 0 auto;
            background: repeating-linear-gradient(
                    90deg,
                    #222,
                    #222 2px,
                    #e1e1e1 2px,
                    #e1e1e1 5px,
                    #222 5px,
                    #222 7px
            );
        }

        /* Responsive configuration for smaller screens */
        @media (max-width: 768px) {
            .card {
                flex-direction: column;
                max-width: 450px;
            }
            .visual-side {
                display: none;
            }
            .form-side {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="form-side">
        <h1>ATM Send Bill Login</h1>
        <div id="error" class="error"></div>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter email">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button onclick="handleLogin()">Login</button>
    </div>

    <div class="visual-side">
        <div class="atm-slot">
            <div class="receipt">
                <div class="receipt-title">CASH RECEIPT</div>
                <div class="receipt-row"><span>SHOP: Euismod</span><span>ADDRESS: Nibh tinci,25/2</span></div>
                <div class="receipt-row"><span>TEL: 123456789</span><span></span></div>
                <div class="receipt-row"><span>DATE: 01/01/01</span><span></span></div>
                <div class="receipt-divider"></div>
                <div class="receipt-row"><span>Lorem ipsum</span><span>2.5</span></div>
                <div class="receipt-row"><span>Dolor sit</span><span>8.7</span></div>
                <div class="receipt-row"><span>Amet</span><span>1.99</span></div>
                <div class="receipt-row"><span>Consectetuer</span><span>4.89</span></div>
                <div class="receipt-row"><span>Adipiscing</span><span>6.38</span></div>
                <div class="receipt-row"><span>Elit sed</span><span>0.99</span></div>
                <div class="receipt-row"><span>Diam nonummy</span><span>9.70</span></div>
                <div class="receipt-divider"></div>
                <div class="receipt-row"><strong>TOTAL:</strong><strong>35.15</strong></div>
                <div class="receipt-row" style="margin-top:4px;"><span>Bank card: **** **** **** ****</span></div>
                <div style="text-align: center; margin-top: 8px; font-weight: bold;">THANK YOU</div>
                <div class="barcode"></div>
            </div>
        </div>
    </div>
</div>

<script>
    if (localStorage.getItem('token')) {
        window.location.href = '/dashboard.html';
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errEl = document.getElementById('error');
        errEl.style.display = 'none';

        if (!email || !password) {
            errEl.textContent = "Please fill in all fields.";
            errEl.style.display = 'block';
            return;
        }

        const data = await apiCall('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
        });

        if (!data || data.error || data.message) {
            errEl.textContent = data?.error || data?.message || "Invalid credentials.";
            errEl.style.display = 'block';
            return;
        }

        if (data.token) {
            localStorage.setItem('token', data.token);
            if (data.user) {
                localStorage.setItem('user', JSON.stringify(data.user));
            }
            window.location.href = '/dashboard.html';
        } else {
            errEl.textContent = "Authentication successful, but no token returned.";
            errEl.style.display = 'block';
        }
    }
</script>
</body>
</html>
